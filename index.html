<!DOCTYPE html>
<html lang="es">
<head>

  <title>Atrapa la bestia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="fondo-estrellas"></div>

  <div class="contenedor">
    <h1>Atrapa la bestia</h1>
    <p id="texto">Persigue a la criatura espacial y captúrala.</p>

    <img id="monstruo" src="" alt="Monstruo espacial">

    <div id="final" class="oculto">
      <div class="cielo">
        <div class="luna"></div>

        <h2>Lograste capturarla</h2>
        <p id="mensajeCaptura">Atrapaste a una bestia.</p>

        <div id="tarjetaMonstruo"></div>

        <h3>Tu colección</h3>
        <div id="coleccion"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
