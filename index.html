<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <button id="activarSonido">Activar sonido</button>
  <button id="reiniciarColeccion">Reiniciar colección</button>
  <title>Atrapa la bestia</title>
  <p>DanielaPR</p>
  <link rel="stylesheet" href="style.css">
</head>

  
<body>
  <div id="fondo-estrellas"></div>
  <img id="cursor-ovni" src="assets/imagen/CursorOvni.png" alt="Cursor ovni">
  <div class="contenedor">
    <h1>Atrapa la bestia</h1>
    <p id="texto">Persigue a la criatura espacial y captúrala.</p>

    <div class="barra">
      <p id="contador">Bestias atrapadas: 0/5</p>
    </div>

    <img id="monstruo" src="" alt="Monstruo espacial">

    <div id="final" class="oculto">
      <div class="cielo">
        <div class="luna"></div>

        <h2>✨Lograste capturarla :D</h2>
        <p id="mensajeCaptura">Atrapaste a una bestia.</p>

        <div id="tarjetaMonstruo"></div>

        <button id="seguirCazando">Seguir cazando</button>

        <h3>Tu colección</h3>
        <div id="coleccion"></div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>



</html>
